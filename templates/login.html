<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 / 註冊 - 記帳整合系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', sans-serif;}
        .login-card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 420px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4 fw-bold text-dark">💰 雲端智慧記帳</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active fw-bold" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">登入系統</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link fw-bold" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">註冊新帳號</button>
          </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
          
          <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
              <form method="POST" action="/login">
                  <input type="hidden" name="action" value="login">
                  <div class="mb-3">
                      <label class="form-label text-muted small">帳號 Username</label>
                      <input type="text" name="username" class="form-control form-control-lg" required>
                  </div>
                  <div class="mb-4">
                      <label class="form-label text-muted small">密碼 Password</label>
                      <input type="password" name="password" class="form-control form-control-lg" required>
                  </div>
                  <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">登入 Login</button>
              </form>
          </div>

          <div class="tab-pane fade" id="pills-register" role="tabpanel">
              <form method="POST" action="/login">
                  <input type="hidden" name="action" value="register">
                  <div class="mb-3">
                      <label class="form-label text-muted small">設定新帳號</label>
                      <input type="text" name="username" class="form-control form-control-lg" required placeholder="想一個好記的帳號">
                  </div>
                  <div class="mb-4">
                      <label class="form-label text-muted small">設定密碼</label>
                      <input type="password" name="password" class="form-control form-control-lg" required>
                  </div>
                  <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">建立帳號 Register</button>
              </form>
          </div>

        </div>
    </div>
</body>
</html>
