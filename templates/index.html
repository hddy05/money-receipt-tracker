<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的記帳系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light pb-5">

<div class="container mt-4">
    <h2 class="mb-4 text-center fw-bold">📊 記帳與載具整合儀表板</h2>

    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-success text-white"><h5 class="mb-0">💰 支出分類佔比</h5></div>
                <div class="card-body d-flex justify-content-center align-items-center">
                    <canvas id="expenseChart" style="max-width: 300px; max-height: 300px;"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-7 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">🧾 載具發票紀錄</h5>
                    <button onclick="syncData()" class="btn btn-light btn-sm fw-bold">🔄 模擬刷載具</button>
                </div>
                <div class="card-body" style="max-height: 320px; overflow-y: auto;">
                    <table class="table table-hover mt-2">
                        <thead class="table-light">
                            <tr>
                                <th>發票號碼</th>
                                <th>商家名稱</th>
                                <th>總金額</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for invoice in invoices %}
                            <tr class="{% if invoice.is_winner %}table-warning fw-bold{% endif %}">
                                <td>
                                    {{ invoice.inv_num }}
                                    {% if invoice.is_winner %} <span class="badge bg-danger">中獎! 🎉</span> {% endif %}
                                </td>
                                <td>{{ invoice.seller_name }}</td>
                                <td class="text-danger">${{ invoice.total_amount }}</td>
                            </tr>
                            {% else %}
                            <tr><td colspan="3" class="text-center text-muted">目前沒有紀錄</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-secondary text-white"><h5 class="mb-0">✍️ 手動記帳 (無載具)</h5></div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">消費品項</label>
                        <input type="text" id="manualName" class="form-control" placeholder="例如：夜市地瓜球">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">金額</label>
                        <input type="number" id="manualAmount" class="form-control" placeholder="50">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">分類</label>
                        <select id="manualCategory" class="form-select">
                            <option value="餐飲食品">餐飲食品</option>
                            <option value="交通運輸">交通運輸</option>
                            <option value="數位3C">數位3C</option>
                            <option value="烘焙開銷">烘焙開銷</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <button onclick="submitManual()" class="btn btn-dark w-100 fw-bold">送出記帳</button>
                </div>
            </div>
        </div>

        <div class="col-md-7 mb-4">
            <div class="card shadow-sm h-100 border-warning">
                <div class="card-header bg-warning text-dark"><h5 class="mb-0">🎁 發票對獎系統</h5></div>
                <div class="card-body d-flex flex-column justify-content-center">
                    <p class="text-muted">請輸入當期中獎號碼的末 3 碼，系統將自動比對所有載具發票。</p>
                    <div class="input-group mb-3 mt-2">
                        <input type="text" id="winningNumber" class="form-control form-control-lg" placeholder="請輸入中獎號碼...">
                        <button onclick="checkLottery()" class="btn btn-danger px-4 fw-bold">開始對獎</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const rawChartData = {{ chart_data | tojson }};
    if (Object.keys(rawChartData).length > 0) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(rawChartData),
                datasets: [{
                    data: Object.values(rawChartData),
                    backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF'],
                    borderWidth: 1
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
    }

    function syncData() {
        fetch('/api/sync_mock').then(() => location.reload());
    }

    // 🌟 發送手動記帳資料給 Python
    function submitManual() {
        const name = document.getElementById('manualName').value;
        const amount = document.getElementById('manualAmount').value;
        const category = document.getElementById('manualCategory').value;
        
        if(!name || !amount) {
            alert('請完整填寫品項與金額！');
            return;
        }

        fetch('/api/add_manual', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ item_name: name, amount: amount, category: category })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            location.reload();
        });
    }

    // 🌟 發送中獎號碼給 Python 進行比對
    function checkLottery() {
        const winningNum = document.getElementById('winningNumber').value;
        
        fetch('/api/check_lottery', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ winning_number: winningNum })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            location.reload();
        });
    }
</script>

</body>
</html>
